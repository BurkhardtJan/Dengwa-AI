services:
  db:
    image: pgvector/pgvector:pg15
    container_name: dengwa-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geheim}
      POSTGRES_DB: ${DB_NAME:-dengwa_db}
      PGDATA: /var/data/pgdata
    volumes:
      - postgres_data:/var/data/pgdata
    ports:
      - "5435:5432"
    networks:
      - dengwa-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dengwa_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dengwa-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy

    env_file:
      - ./backend/.env
    environment:
      - SQLALCHEMY_DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-geheim}@db:5432/${DB_NAME:-dengwa_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - dengwa-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dengwa-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dengwa-network

volumes:
  postgres_data:

networks:
  dengwa-network:
    driver: bridge